name: Build VideoToAudioConverter

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Download static ffmpeg for macOS arm64
        run: |
          echo "Downloading static ffmpeg build..."

          # Static ffmpeg build from evermeet.cx - single self-contained binary
          # This is a trusted source used by many projects
          curl -L "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip" -o ffmpeg.zip

          echo "Downloaded zip size: $(du -sh ffmpeg.zip)"

          unzip -o ffmpeg.zip
          chmod +x ffmpeg

          echo ""
          echo "Extracted ffmpeg size: $(du -sh ffmpeg)"
          ls -lah ffmpeg

          echo ""
          echo "Verifying binary runs:"
          ./ffmpeg -version

      - name: Build macOS app
        run: |
          if [ ! -f "./ffmpeg" ]; then
            echo "ERROR: ffmpeg not found in working directory"
            exit 1
          fi

          FFMPEG_SIZE=$(du -sm ./ffmpeg | cut -f1)
          echo "Building with ffmpeg (${FFMPEG_SIZE}MB)"

          python -m PyInstaller \
            --noconfirm \
            --onefile \
            --windowed \
            --name "VideoToAudioConverter" \
            --add-binary "ffmpeg:." \
            --hidden-import tkinter \
            --hidden-import tkinter.ttk \
            --hidden-import tkinter.filedialog \
            --hidden-import tkinter.messagebox \
            --osx-bundle-identifier "com.yourname.videotoaudio" \
            main.py

      - name: Verify app size
        run: |
          SIZE=$(du -sh dist/VideoToAudioConverter.app)
          SIZE_MB=$(du -sm dist/VideoToAudioConverter.app | cut -f1)
          echo "=========================================="
          echo "App size: $SIZE"
          echo "=========================================="
          if [ "$SIZE_MB" -lt 20 ]; then
            echo "ERROR: App is too small (${SIZE_MB}MB) - ffmpeg was not bundled correctly"
            exit 1
          else
            echo "Size looks good - ffmpeg was bundled correctly"
          fi

      - name: Zip the app bundle
        run: |
          cd dist
          zip -r VideoToAudioConverter-macOS.zip VideoToAudioConverter.app
          echo "Zip size: $(du -sh VideoToAudioConverter-macOS.zip)"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoToAudioConverter-macOS
          path: dist/VideoToAudioConverter-macOS.zip
          retention-days: 30

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Download static ffmpeg for Windows
        shell: pwsh
        run: |
          Write-Host "Downloading static ffmpeg build for Windows..."

          # Static ffmpeg build from gyan.dev - the most trusted Windows ffmpeg source
          # This is a single static exe with no dependencies
          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          $zipPath = "ffmpeg-windows.zip"

          Write-Host "Downloading from: $url"
          Invoke-WebRequest -Uri $url -OutFile $zipPath

          $zipSize = (Get-Item $zipPath).Length / 1MB
          Write-Host "Downloaded zip size: $zipSize MB"

          # Extract the zip
          Write-Host "Extracting..."
          Expand-Archive -Path $zipPath -DestinationPath "ffmpeg-extracted" -Force

          # Find ffmpeg.exe inside the extracted folder
          Write-Host "Searching for ffmpeg.exe in extracted files:"
          $allFfmpeg = Get-ChildItem "ffmpeg-extracted" -Recurse -Filter "ffmpeg.exe"
          $allFfmpeg | ForEach-Object {
            Write-Host "  Found: $($_.FullName)  |  Size: $($_.Length / 1MB) MB"
          }

          # Pick the largest one
          $realFfmpeg = $allFfmpeg | Sort-Object Length -Descending | Select-Object -First 1

          if (-not $realFfmpeg) {
            Write-Error "ffmpeg.exe not found in extracted zip"
            exit 1
          }

          Write-Host ""
          Write-Host "=========================================="
          Write-Host "Selected: $($realFfmpeg.FullName)"
          Write-Host "Size: $($realFfmpeg.Length / 1MB) MB"
          Write-Host "=========================================="

          # Copy next to main.py
          Copy-Item $realFfmpeg.FullName -Destination ".\ffmpeg.exe"
          Write-Host "Copied to working directory"
          Write-Host "Confirmed size: $((Get-Item '.\ffmpeg.exe').Length / 1MB) MB"

          # Verify it runs
          Write-Host ""
          Write-Host "Verifying binary runs:"
          .\ffmpeg.exe -version
          if ($LASTEXITCODE -ne 0) {
            Write-Error "ffmpeg.exe failed to run"
            exit 1
          }

      - name: Build Windows exe
        shell: pwsh
        run: |
          if (-not (Test-Path ".\ffmpeg.exe")) {
            Write-Error "ffmpeg.exe not found in working directory"
            exit 1
          }

          $ffmpegSize = (Get-Item ".\ffmpeg.exe").Length / 1MB
          Write-Host "Building with ffmpeg.exe ($ffmpegSize MB)"

          python -m PyInstaller `
            --noconfirm `
            --onefile `
            --windowed `
            --name "VideoToAudioConverter" `
            --add-binary "ffmpeg.exe;." `
            --hidden-import tkinter `
            --hidden-import tkinter.ttk `
            --hidden-import tkinter.filedialog `
            --hidden-import tkinter.messagebox `
            main.py

      - name: Verify exe size
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\VideoToAudioConverter.exe")) {
            Write-Error "EXE was not created"
            exit 1
          }

          $size = (Get-Item "dist\VideoToAudioConverter.exe").Length / 1MB
          Write-Host "=========================================="
          Write-Host "EXE size: $size MB"
          Write-Host "=========================================="

          if ($size -lt 20) {
            Write-Error "EXE too small ($size MB) - ffmpeg not bundled correctly"
            exit 1
          } else {
            Write-Host "Size looks good - ffmpeg was bundled correctly"
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoToAudioConverter-Windows
          path: dist\VideoToAudioConverter.exe
          retention-days: 30