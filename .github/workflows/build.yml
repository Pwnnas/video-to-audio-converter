name: Build VideoToAudioConverter

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build macOS app
        run: |
          FFMPEG_PATH="$(which ffmpeg)"
          echo "Using ffmpeg at: $FFMPEG_PATH"
          pyinstaller \
            --noconfirm \
            --onefile \
            --windowed \
            --name "VideoToAudioConverter" \
            --add-binary "$FFMPEG_PATH:." \
            --hidden-import tkinter \
            --hidden-import tkinter.ttk \
            --hidden-import tkinter.filedialog \
            --hidden-import tkinter.messagebox \
            --osx-bundle-identifier "com.yourname.videotoaudio" \
            main.py

      - name: Zip the app bundle
        run: |
          cd dist
          zip -r VideoToAudioConverter-macOS.zip VideoToAudioConverter.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoToAudioConverter-macOS
          path: dist/VideoToAudioConverter-macOS.zip
          retention-days: 30

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg via chocolatey
        run: choco install ffmpeg -y
        shell: pwsh

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Find ffmpeg and build exe
        shell: pwsh
        run: |
          # Refresh PATH so choco installs are visible
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")

          # Try PATH first
          $ffmpeg = (Get-Command ffmpeg -ErrorAction SilentlyContinue).Source

          # Known Chocolatey locations as fallback
          if (-not $ffmpeg) {
            $candidates = @(
              "C:\ProgramData\chocolatey\bin\ffmpeg.exe",
              "C:\ProgramData\chocolatey\lib\ffmpeg\tools\ffmpeg\bin\ffmpeg.exe",
              "C:\tools\ffmpeg\bin\ffmpeg.exe"
            )
            foreach ($c in $candidates) {
              if (Test-Path $c) {
                $ffmpeg = $c
                break
              }
            }
          }

          if (-not $ffmpeg) {
            Write-Error "ffmpeg.exe could not be found after install. Searched PATH and known Chocolatey paths."
            exit 1
          }

          Write-Host "=========================================="
          Write-Host "Found ffmpeg at: $ffmpeg"
          Write-Host "=========================================="

          # Verify it actually runs
          & $ffmpeg -version
          if ($LASTEXITCODE -ne 0) {
            Write-Error "ffmpeg found but failed to run"
            exit 1
          }

          pyinstaller `
            --noconfirm `
            --onefile `
            --windowed `
            --name "VideoToAudioConverter" `
            "--add-binary=$ffmpeg;." `
            --hidden-import tkinter `
            --hidden-import tkinter.ttk `
            --hidden-import tkinter.filedialog `
            --hidden-import tkinter.messagebox `
            main.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoToAudioConverter-Windows
          path: dist\VideoToAudioConverter.exe
          retention-days: 30