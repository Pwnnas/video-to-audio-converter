name: Build VideoToAudioConverter

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Copy ffmpeg next to source files
        run: |
          FFMPEG_PATH="$(which ffmpeg)"
          echo "Found ffmpeg at: $FFMPEG_PATH"
          echo "ffmpeg size: $(du -sh $FFMPEG_PATH)"

          # Copy ffmpeg right next to main.py
          cp "$FFMPEG_PATH" ./ffmpeg
          chmod +x ./ffmpeg

          echo "Copied ffmpeg to working directory"
          echo "Local ffmpeg size: $(du -sh ./ffmpeg)"
          ls -lah ./ffmpeg

      - name: Build macOS app
        run: |
          # Confirm ffmpeg is here
          if [ ! -f "./ffmpeg" ]; then
            echo "ERROR: ffmpeg not found in working directory"
            exit 1
          fi

          python -m PyInstaller \
            --noconfirm \
            --onefile \
            --windowed \
            --name "VideoToAudioConverter" \
            --add-binary "ffmpeg:." \
            --hidden-import tkinter \
            --hidden-import tkinter.ttk \
            --hidden-import tkinter.filedialog \
            --hidden-import tkinter.messagebox \
            --osx-bundle-identifier "com.yourname.videotoaudio" \
            main.py

      - name: Verify app size
        run: |
          SIZE=$(du -sh dist/VideoToAudioConverter.app)
          SIZE_MB=$(du -sm dist/VideoToAudioConverter.app | cut -f1)
          echo "=========================================="
          echo "App size: $SIZE"
          echo "=========================================="
          if [ "$SIZE_MB" -lt 20 ]; then
            echo "WARNING: App seems too small - ffmpeg may not have been bundled"
            exit 1
          else
            echo "Size looks good - ffmpeg was likely bundled correctly"
          fi

      - name: Zip the app bundle
        run: |
          cd dist
          zip -r VideoToAudioConverter-macOS.zip VideoToAudioConverter.app
          echo "Zip size: $(du -sh VideoToAudioConverter-macOS.zip)"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoToAudioConverter-macOS
          path: dist/VideoToAudioConverter-macOS.zip
          retention-days: 30

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Install ffmpeg via chocolatey
        shell: pwsh
        run: |
          choco install ffmpeg -y
          # Refresh PATH in this step so we can verify
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          Write-Host "Verifying ffmpeg after install:"
          ffmpeg -version

      - name: Copy ffmpeg next to source files
        shell: pwsh
        run: |
          # Refresh PATH
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")

          # Try PATH first
          $ffmpeg = (Get-Command ffmpeg -ErrorAction SilentlyContinue).Source

          # Known Chocolatey locations as fallback
          if (-not $ffmpeg) {
            $candidates = @(
              "C:\ProgramData\chocolatey\bin\ffmpeg.exe",
              "C:\ProgramData\chocolatey\lib\ffmpeg\tools\ffmpeg\bin\ffmpeg.exe",
              "C:\tools\ffmpeg\bin\ffmpeg.exe"
            )
            foreach ($c in $candidates) {
              if (Test-Path $c) {
                $ffmpeg = $c
                break
              }
            }
          }

          if (-not $ffmpeg) {
            Write-Error "Could not find ffmpeg.exe anywhere"
            exit 1
          }

          Write-Host "Found ffmpeg at: $ffmpeg"
          Write-Host "ffmpeg size: $((Get-Item $ffmpeg).Length / 1MB) MB"

          # Copy ffmpeg.exe right next to main.py
          Copy-Item $ffmpeg -Destination ".\ffmpeg.exe"
          Write-Host "Copied ffmpeg.exe to working directory"
          Write-Host "Local copy size: $((Get-Item '.\ffmpeg.exe').Length / 1MB) MB"

          # List directory to confirm
          Get-ChildItem -Name "*.exe", "*.py"

      - name: Build Windows exe
        shell: pwsh
        run: |
          # Confirm ffmpeg.exe is here
          if (-not (Test-Path ".\ffmpeg.exe")) {
            Write-Error "ffmpeg.exe not found in working directory"
            exit 1
          }

          $ffmpegSize = (Get-Item ".\ffmpeg.exe").Length / 1MB
          Write-Host "ffmpeg.exe size: $ffmpegSize MB"

          python -m PyInstaller `
            --noconfirm `
            --onefile `
            --windowed `
            --name "VideoToAudioConverter" `
            --add-binary "ffmpeg.exe;." `
            --hidden-import tkinter `
            --hidden-import tkinter.ttk `
            --hidden-import tkinter.filedialog `
            --hidden-import tkinter.messagebox `
            main.py

      - name: Verify exe size
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\VideoToAudioConverter.exe")) {
            Write-Error "EXE was not created"
            exit 1
          }
          $size = (Get-Item "dist\VideoToAudioConverter.exe").Length / 1MB
          Write-Host "=========================================="
          Write-Host "EXE size: $size MB"
          Write-Host "=========================================="
          if ($size -lt 20) {
            Write-Error "EXE is too small ($size MB) - ffmpeg was not bundled correctly"
            exit 1
          } else {
            Write-Host "Size looks good - ffmpeg was bundled correctly"
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoToAudioConverter-Windows
          path: dist\VideoToAudioConverter.exe
          retention-days: 30