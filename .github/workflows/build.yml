name: Build VideoToAudioConverter

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Copy ffmpeg next to source files
        run: |
          FFMPEG_PATH="/opt/homebrew/Cellar/ffmpeg/8.0.1_4/bin/ffmpeg"
          cp "$FFMPEG_PATH" ./ffmpeg
          chmod +x ./ffmpeg
          echo "Found ffmpeg at: $FFMPEG_PATH"
          echo "ffmpeg size: $(du -sh $FFMPEG_PATH)"
          echo "Copied ffmpeg to working directory"
          echo "Local ffmpeg size: $(du -sh ./ffmpeg)"
          ls -lah ./ffmpeg

      - name: Build macOS app
        run: |
          if [ ! -f "./ffmpeg" ]; then
            echo "ERROR: ffmpeg not found in working directory"
            exit 1
          fi

          python -m PyInstaller \
            --noconfirm \
            --onefile \
            --windowed \
            --name "VideoToAudioConverter" \
            --add-binary "ffmpeg:." \
            --hidden-import tkinter \
            --hidden-import tkinter.ttk \
            --hidden-import tkinter.filedialog \
            --hidden-import tkinter.messagebox \
            --osx-bundle-identifier "com.yourname.videotoaudio" \
            main.py

      - name: Verify app size
        run: |
          SIZE=$(du -sh dist/VideoToAudioConverter.app)
          SIZE_MB=$(du -sm dist/VideoToAudioConverter.app | cut -f1)
          echo "=========================================="
          echo "App size: $SIZE"
          echo "=========================================="
          if [ "$SIZE_MB" -lt 20 ]; then
            echo "ERROR: App is too small - ffmpeg was not bundled correctly"
            exit 1
          else
            echo "Size looks good - ffmpeg was bundled correctly"
          fi

      - name: Zip the app bundle
        run: |
          cd dist
          zip -r VideoToAudioConverter-macOS.zip VideoToAudioConverter.app
          echo "Zip size: $(du -sh VideoToAudioConverter-macOS.zip)"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoToAudioConverter-macOS
          path: dist/VideoToAudioConverter-macOS.zip
          retention-days: 30

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Install ffmpeg via chocolatey
        shell: pwsh
        run: |
          choco install ffmpeg -y

      - name: Find REAL ffmpeg binary and copy it locally
        shell: pwsh
        run: |
          Write-Host "Searching for real ffmpeg binary (not the choco shim)..."
          Write-Host ""

          # The shim is tiny (~0.3mb) - we need the real binary
          # Chocolatey deploys the real ffmpeg under lib\ffmpeg\tools
          # Search recursively under the choco lib folder
          $chocoLib = "C:\ProgramData\chocolatey\lib\ffmpeg"
          
          Write-Host "Listing chocolatey ffmpeg lib folder:"
          if (Test-Path $chocoLib) {
            Get-ChildItem $chocoLib -Recurse -Filter "ffmpeg.exe" | ForEach-Object {
              Write-Host "  Found: $($_.FullName)  |  Size: $($_.Length / 1MB) MB"
            }
          } else {
            Write-Host "Folder not found: $chocoLib"
          }

          # Find all ffmpeg.exe files and pick the biggest one (the real binary)
          $allCandidates = @()

          # Check choco lib path
          if (Test-Path $chocoLib) {
            $found = Get-ChildItem $chocoLib -Recurse -Filter "ffmpeg.exe" -ErrorAction SilentlyContinue
            $allCandidates += $found
          }

          # Also check tools folder
          $chocoTools = "C:\tools\ffmpeg"
          if (Test-Path $chocoTools) {
            $found = Get-ChildItem $chocoTools -Recurse -Filter "ffmpeg.exe" -ErrorAction SilentlyContinue
            $allCandidates += $found
          }

          if ($allCandidates.Count -eq 0) {
            Write-Error "No ffmpeg.exe found in chocolatey lib or tools folders"
            exit 1
          }

          # Sort by size descending and take the largest — that is the real binary
          $realFfmpeg = $allCandidates | Sort-Object Length -Descending | Select-Object -First 1

          Write-Host ""
          Write-Host "=========================================="
          Write-Host "Selected real ffmpeg: $($realFfmpeg.FullName)"
          Write-Host "Size: $($realFfmpeg.Length / 1MB) MB"
          Write-Host "=========================================="

          if ($realFfmpeg.Length -lt 10MB) {
            Write-Error "Selected ffmpeg is still too small ($($realFfmpeg.Length / 1MB) MB) - may still be a shim"
            exit 1
          }

          # Copy real ffmpeg.exe next to main.py
          Copy-Item $realFfmpeg.FullName -Destination ".\ffmpeg.exe"
          Write-Host "Copied real ffmpeg.exe to working directory"
          Write-Host "Confirmed local size: $((Get-Item '.\ffmpeg.exe').Length / 1MB) MB"

          # Verify it actually runs
          Write-Host ""
          Write-Host "Verifying binary runs:"
          .\ffmpeg.exe -version
          if ($LASTEXITCODE -ne 0) {
            Write-Error "ffmpeg.exe found but failed to execute"
            exit 1
          }

      - name: Build Windows exe
        shell: pwsh
        run: |
          if (-not (Test-Path ".\ffmpeg.exe")) {
            Write-Error "ffmpeg.exe not found in working directory"
            exit 1
          }

          $ffmpegSize = (Get-Item ".\ffmpeg.exe").Length / 1MB
          Write-Host "Building with ffmpeg.exe ($ffmpegSize MB)"

          python -m PyInstaller `
            --noconfirm `
            --onefile `
            --windowed `
            --name "VideoToAudioConverter" `
            --add-binary "ffmpeg.exe;." `
            --hidden-import tkinter `
            --hidden-import tkinter.ttk `
            --hidden-import tkinter.filedialog `
            --hidden-import tkinter.messagebox `
            main.py

      - name: Verify exe size
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\VideoToAudioConverter.exe")) {
            Write-Error "EXE was not created"
            exit 1
          }

          $size = (Get-Item "dist\VideoToAudioConverter.exe").Length / 1MB
          Write-Host "=========================================="
          Write-Host "EXE size: $size MB"
          Write-Host "=========================================="

          if ($size -lt 20) {
            Write-Error "EXE is too small ($size MB) - ffmpeg was not bundled correctly"
            exit 1
          } else {
            Write-Host "Size looks good - ffmpeg was bundled correctly"
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoToAudioConverter-Windows
          path: dist\VideoToAudioConverter.exe
          retention-days: 30