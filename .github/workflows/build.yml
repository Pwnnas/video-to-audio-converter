name: Build VideoToAudioConverter

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Find real ffmpeg binary and copy it locally
        run: |
          echo "Searching for real ffmpeg binary (not the brew stub)..."
          echo ""

          # Show what 'which' gives us
          WHICH_FFMPEG="$(which ffmpeg)"
          echo "which ffmpeg: $WHICH_FFMPEG"
          echo "which ffmpeg size: $(du -sh $WHICH_FFMPEG)"
          echo ""

          # The real binary lives inside the Homebrew Cellar
          # Search for the biggest ffmpeg binary under the Cellar
          echo "Searching Homebrew Cellar for real ffmpeg binary:"
          find /opt/homebrew/Cellar/ffmpeg -name "ffmpeg" -type f 2>/dev/null | while read f; do
            echo "  Found: $f  |  Size: $(du -sh $f)"
          done
          echo ""

          # Also check older Intel Homebrew path just in case
          find /usr/local/Cellar/ffmpeg -name "ffmpeg" -type f 2>/dev/null | while read f; do
            echo "  Found (Intel): $f  |  Size: $(du -sh $f)"
          done

          # Pick the largest ffmpeg binary from the Cellar
          REAL_FFMPEG=$(find /opt/homebrew/Cellar/ffmpeg -name "ffmpeg" -type f 2>/dev/null \
            | xargs ls -S 2>/dev/null \
            | head -1)

          # Fallback to Intel path
          if [ -z "$REAL_FFMPEG" ]; then
            REAL_FFMPEG=$(find /usr/local/Cellar/ffmpeg -name "ffmpeg" -type f 2>/dev/null \
              | xargs ls -S 2>/dev/null \
              | head -1)
          fi

          # Fallback to resolving the symlink manually
          if [ -z "$REAL_FFMPEG" ]; then
            echo "Cellar search failed, trying to resolve symlink..."
            REAL_FFMPEG="$(realpath $WHICH_FFMPEG 2>/dev/null || readlink -f $WHICH_FFMPEG 2>/dev/null)"
            echo "Resolved symlink to: $REAL_FFMPEG"
          fi

          if [ -z "$REAL_FFMPEG" ]; then
            echo "ERROR: Could not find real ffmpeg binary"
            exit 1
          fi

          FFMPEG_SIZE=$(du -sm "$REAL_FFMPEG" | cut -f1)
          echo "=========================================="
          echo "Selected real ffmpeg: $REAL_FFMPEG"
          echo "Size: $(du -sh $REAL_FFMPEG)"
          echo "=========================================="

          if [ "$FFMPEG_SIZE" -lt 10 ]; then
            echo "ERROR: Selected ffmpeg is still too small (${FFMPEG_SIZE}MB) - may still be a stub"
            exit 1
          fi

          # Copy real ffmpeg next to main.py
          cp "$REAL_FFMPEG" ./ffmpeg
          chmod +x ./ffmpeg

          echo ""
          echo "Copied real ffmpeg to working directory"
          echo "Confirmed local size: $(du -sh ./ffmpeg)"
          ls -lah ./ffmpeg

          # Verify it actually runs
          echo ""
          echo "Verifying binary runs:"
          ./ffmpeg -version

      - name: Build macOS app
        run: |
          if [ ! -f "./ffmpeg" ]; then
            echo "ERROR: ffmpeg not found in working directory"
            exit 1
          fi

          FFMPEG_SIZE=$(du -sm ./ffmpeg | cut -f1)
          echo "Building with ffmpeg (${FFMPEG_SIZE}MB)"

          python -m PyInstaller \
            --noconfirm \
            --onefile \
            --windowed \
            --name "VideoToAudioConverter" \
            --add-binary "ffmpeg:." \
            --hidden-import tkinter \
            --hidden-import tkinter.ttk \
            --hidden-import tkinter.filedialog \
            --hidden-import tkinter.messagebox \
            --osx-bundle-identifier "com.yourname.videotoaudio" \
            main.py

      - name: Verify app size
        run: |
          SIZE=$(du -sh dist/VideoToAudioConverter.app)
          SIZE_MB=$(du -sm dist/VideoToAudioConverter.app | cut -f1)
          echo "=========================================="
          echo "App size: $SIZE"
          echo "=========================================="
          if [ "$SIZE_MB" -lt 20 ]; then
            echo "ERROR: App is too small (${SIZE_MB}MB) - ffmpeg was not bundled correctly"
            exit 1
          else
            echo "Size looks good - ffmpeg was bundled correctly"
          fi

      - name: Zip the app bundle
        run: |
          cd dist
          zip -r VideoToAudioConverter-macOS.zip VideoToAudioConverter.app
          echo "Zip size: $(du -sh VideoToAudioConverter-macOS.zip)"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoToAudioConverter-macOS
          path: dist/VideoToAudioConverter-macOS.zip
          retention-days: 30

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Install ffmpeg via chocolatey
        shell: pwsh
        run: choco install ffmpeg -y

      - name: Find real ffmpeg binary and copy it locally
        shell: pwsh
        run: |
          Write-Host "Searching for real ffmpeg binary (not the choco shim)..."
          Write-Host ""

          # List everything found under choco lib
          $chocoLib = "C:\ProgramData\chocolatey\lib\ffmpeg"
          Write-Host "Listing chocolatey ffmpeg lib folder:"
          if (Test-Path $chocoLib) {
            Get-ChildItem $chocoLib -Recurse -Filter "ffmpeg.exe" | ForEach-Object {
              Write-Host "  Found: $($_.FullName)  |  Size: $($_.Length / 1MB) MB"
            }
          }

          # Collect all candidates
          $allCandidates = @()
          if (Test-Path $chocoLib) {
            $allCandidates += Get-ChildItem $chocoLib -Recurse -Filter "ffmpeg.exe" -ErrorAction SilentlyContinue
          }
          if (Test-Path "C:\tools\ffmpeg") {
            $allCandidates += Get-ChildItem "C:\tools\ffmpeg" -Recurse -Filter "ffmpeg.exe" -ErrorAction SilentlyContinue
          }

          if ($allCandidates.Count -eq 0) {
            Write-Error "No ffmpeg.exe found in chocolatey lib or tools folders"
            exit 1
          }

          # Pick the largest one - that is the real binary
          $realFfmpeg = $allCandidates | Sort-Object Length -Descending | Select-Object -First 1

          Write-Host ""
          Write-Host "=========================================="
          Write-Host "Selected: $($realFfmpeg.FullName)"
          Write-Host "Size: $($realFfmpeg.Length / 1MB) MB"
          Write-Host "=========================================="

          if ($realFfmpeg.Length -lt 10MB) {
            Write-Error "Still too small ($($realFfmpeg.Length / 1MB) MB) - may still be a shim"
            exit 1
          }

          Copy-Item $realFfmpeg.FullName -Destination ".\ffmpeg.exe"
          Write-Host "Copied real ffmpeg.exe to working directory"
          Write-Host "Confirmed local size: $((Get-Item '.\ffmpeg.exe').Length / 1MB) MB"

          Write-Host ""
          Write-Host "Verifying binary runs:"
          .\ffmpeg.exe -version
          if ($LASTEXITCODE -ne 0) {
            Write-Error "ffmpeg.exe found but failed to execute"
            exit 1
          }

      - name: Build Windows exe
        shell: pwsh
        run: |
          if (-not (Test-Path ".\ffmpeg.exe")) {
            Write-Error "ffmpeg.exe not found in working directory"
            exit 1
          }

          $ffmpegSize = (Get-Item ".\ffmpeg.exe").Length / 1MB
          Write-Host "Building with ffmpeg.exe ($ffmpegSize MB)"

          python -m PyInstaller `
            --noconfirm `
            --onefile `
            --windowed `
            --name "VideoToAudioConverter" `
            --add-binary "ffmpeg.exe;." `
            --hidden-import tkinter `
            --hidden-import tkinter.ttk `
            --hidden-import tkinter.filedialog `
            --hidden-import tkinter.messagebox `
            main.py

      - name: Verify exe size
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\VideoToAudioConverter.exe")) {
            Write-Error "EXE was not created"
            exit 1
          }

          $size = (Get-Item "dist\VideoToAudioConverter.exe").Length / 1MB
          Write-Host "=========================================="
          Write-Host "EXE size: $size MB"
          Write-Host "=========================================="

          if ($size -lt 20) {
            Write-Error "EXE too small ($size MB) - ffmpeg not bundled correctly"
            exit 1
          } else {
            Write-Host "Size looks good - ffmpeg was bundled correctly"
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoToAudioConverter-Windows
          path: dist\VideoToAudioConverter.exe
          retention-days: 30